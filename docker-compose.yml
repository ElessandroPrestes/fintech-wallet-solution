services:
  postgres:
    image: postgres:16-alpine
    container_name: fintech_wallet_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wallet_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wallet_pass}
      POSTGRES_DB: ${POSTGRES_DB:-wallet_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fintech_wallet_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-wallet_user} -d ${POSTGRES_DB:-wallet_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    image: fintech_wallet_backend:dev   # <-- nome da imagem definido
    container_name: fintech_wallet_backend
    command: npm run start:dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-wallet_user}:${POSTGRES_PASSWORD:-wallet_pass}@postgres:5432/${POSTGRES_DB:-wallet_db}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      PORT: 3000
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fintech_wallet_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    image: fintech_wallet_frontend:dev   # <-- nome da imagem definido
    container_name: fintech_wallet_frontend
    command: npm run dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      API_URL: http://fintech_wallet_backend:3000
      NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - '3001:3000'

    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - fintech_wallet_network

volumes:
  postgres_data:

networks:
  fintech_wallet_network:
    driver: bridge
